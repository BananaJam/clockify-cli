# Custom dist publish job (see publish-jobs in dist-workspace.toml).
#
# Renders .github/homebrew/clockify-cli.rb with the released version and
# per-target sha256 sums, then pushes it to BananaJam/homebrew-tap. We keep
# our own formula instead of dist's generated one so that `brew install`
# also gets man pages and shell completions (generated by the binary itself
# via the hidden `clockify man` / `clockify completions` subcommands).
name: Publish Homebrew Formula

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-22.04
    env:
      PLAN: ${{ inputs.plan }}
    steps:
      - name: Checkout clockify-cli (for the formula template)
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          path: repo
      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: BananaJam/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          persist-credentials: true
      - name: Render and push formula
        run: |
          version=$(echo "$PLAN" | jq -r '[.releases[] | select(.app_name == "clockify-cli")][0].app_version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "could not find clockify-cli release in dist plan" >&2
            exit 1
          fi
          base="https://github.com/BananaJam/clockify-cli/releases/download/v${version}"

          render_args=(-e "s/{{VERSION}}/${version}/g")
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            sha=$(curl -fsSL "${base}/clockify-cli-${target}.tar.xz.sha256" | awk '{print $1}')
            if [ -z "$sha" ]; then
              echo "missing sha256 for ${target}" >&2
              exit 1
            fi
            key=$(echo "$target" | tr 'a-z-' 'A-Z_')
            render_args+=(-e "s/{{SHA_${key}}}/${sha}/g")
          done

          mkdir -p tap/Formula
          sed "${render_args[@]}" repo/.github/homebrew/clockify-cli.rb > tap/Formula/clockify-cli.rb

          if grep -q '{{' tap/Formula/clockify-cli.rb; then
            echo "unrendered placeholders left in formula:" >&2
            grep '{{' tap/Formula/clockify-cli.rb >&2
            exit 1
          fi

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/clockify-cli.rb
          git commit -m "clockify-cli ${version}"
          git push
